# ============================================================================
# GitPilot — GitHub Actions Workflow
# Triggers GitPilot agent on PR events for automated review & analysis
# ============================================================================

name: "🤖 GitPilot — AI Code Review & Security Analysis"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev, staging, main]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

# Prevent duplicate runs on the same PR
concurrency:
  group: gitpilot-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

env:
  GITPILOT_VERSION: "1.0.0"
  GITPILOT_LOG_LEVEL: "info"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: AI-Powered Code Review & Security Analysis
  # ---------------------------------------------------------------------------
  review:
    name: "🔍 Code Review & 🔒 Security Scan"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'gitpilot:skip')
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install openai pyyaml requests

      - name: 🤖 Run GitPilot AI Review
        id: ai-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.GITPILOT_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch PR diff
          gh pr diff $PR_NUMBER > /tmp/pr.diff 2>/dev/null || echo "No diff available" > /tmp/pr.diff

          # Get list of changed files with content
          CHANGED_FILES=$(gh pr view $PR_NUMBER --json files --jq '.files[].path' 2>/dev/null || echo "unknown")

          python3 << 'PYTHON_SCRIPT'
          import os, json, requests

          api_key = os.environ.get("OPENAI_API_KEY", "")
          pr_number = os.environ.get("PR_NUMBER", "0")

          # Read the diff
          with open("/tmp/pr.diff", "r") as f:
              diff = f.read()

          if not diff.strip():
              diff = "No diff available"

          # Truncate diff if too large (API limit)
          if len(diff) > 12000:
              diff = diff[:12000] + "\n... (truncated)"

          # Build the prompt from SOUL.md + SKILL.md principles
          prompt = f"""You are GitPilot, an autonomous AI code review agent. You are reviewing Pull Request #{pr_number}.

          Analyze the following code diff and provide a structured review covering:

          ## 1. 🔍 Code Review
          - Bugs (null dereferences, off-by-one, logic errors)
          - Anti-patterns (god classes, magic numbers, deep nesting)
          - Performance issues (N+1 queries, O(n²) loops)
          - Complexity concerns

          ## 2. 🔒 Security Analysis  
          - Hardcoded secrets (API keys, passwords, tokens)
          - SQL injection, XSS, command injection
          - Unsafe imports (eval, exec, pickle, os.system)
          - Weak cryptography (MD5, SHA1 for passwords)
          - OWASP Top-10 violations

          ## 3. 📊 Risk Score
          Compute a risk score from 0.0 to 1.0 using:
          risk = 0.35 × security + 0.25 × bugs + 0.20 × complexity + 0.10 × coverage_gap + 0.10 × doc_debt

          Format your response EXACTLY as a structured review with:
          - A one-line verdict: ✅ APPROVED, ⚠️ NEEDS REVIEW, or 🔴 BLOCKED
          - Risk score with visual bar
          - Findings table with severity, file, line, description
          - Suggested fixes for each finding
          - Use emojis for visual scanning

          Here is the diff:
          ```diff
          {diff}
          ```

          Respond in clean Markdown suitable for a GitHub PR comment."""

          # Call OpenAI API
          headers = {{
              "Authorization": f"Bearer {{api_key}}",
              "Content-Type": "application/json"
          }}

          payload = {{
              "model": "gpt-4o",
              "messages": [
                  {{"role": "system", "content": "You are GitPilot, a precise, empathetic, and decisive AI code reviewer. Cite exact line numbers. Provide actionable fixes. Be proportional — critical issues get 🔴, minor issues get 💡."}},
                  {{"role": "user", "content": prompt}}
              ],
              "temperature": 0.1,
              "max_tokens": 4000
          }}

          try:
              response = requests.post(
                  "https://api.openai.com/v1/chat/completions",
                  headers=headers,
                  json=payload,
                  timeout=60
              )
              response.raise_for_status()
              result = response.json()
              review_text = result["choices"][0]["message"]["content"]
          except Exception as e:
              review_text = f"⚠️ GitPilot AI review encountered an error: {{str(e)}}\\n\\nFalling back to static analysis."

          # Write review to file for next step
          with open("/tmp/review_output.md", "w") as f:
              f.write(review_text)

          print("✅ AI review completed successfully")
          print(f"Review length: {{len(review_text)}} characters")
          PYTHON_SCRIPT

      - name: 💬 Post AI Review Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reviewBody = '';

            try {
              reviewBody = fs.readFileSync('/tmp/review_output.md', 'utf8');
            } catch (e) {
              reviewBody = '⚠️ GitPilot could not generate a review. Check the workflow logs.';
            }

            const timestamp = new Date().toISOString();
            const body = `## 🤖 GitPilot Review — PR #${{ github.event.pull_request.number }}

            ${reviewBody}

            ---
            *GitPilot v${{ env.GITPILOT_VERSION }} • ${timestamp} • Powered by AI*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

            console.log('✅ Review comment posted to PR');

  # ---------------------------------------------------------------------------
  # Job 2: Test Generation (runs after review)
  # ---------------------------------------------------------------------------
  test-generation:
    name: "🧪 Test Generation"
    runs-on: ubuntu-latest
    needs: review
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'gitpilot:generate-tests')
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🧪 Run Test Generator Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.GITPILOT_API_KEY }}
        run: |
          echo "Test Generator agent would analyze modified functions and generate tests."
          echo "Tests would be committed to a gitpilot/* branch and a PR opened."

  # ---------------------------------------------------------------------------
  # Job 3: Documentation (on merge only)
  # ---------------------------------------------------------------------------
  documentation:
    name: "📝 Documentation Update"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📝 Run Documentation Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.GITPILOT_API_KEY }}
        run: |
          echo "Documentation agent would update README, docstrings, and API docs."
          echo "Changes would be committed to a gitpilot/docs-update branch."

  # ---------------------------------------------------------------------------
  # Job 4: Human Override Handler (/approve, /reject commands)
  # ---------------------------------------------------------------------------
  human-override:
    name: "👤 Human Override"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/approve') ||
       startsWith(github.event.comment.body, '/reject'))
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 👤 Process Human Override
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          echo "Processing override command from $COMMENT_AUTHOR"
          echo "Command: $COMMENT_BODY"

      - name: 📋 Log Override to Audit Trail
        run: |
          echo "Audit log entry created for human override."

  # ---------------------------------------------------------------------------
  # Job 5: Deployment Readiness (manual trigger)
  # ---------------------------------------------------------------------------
  deployment-check:
    name: "🚀 Deployment Readiness"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'gitpilot:deploy-check')
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Run Deployment Advisor Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "Deployment advisor analyzing readiness for promotion to $TARGET_BRANCH"
          echo "Checking CI/CD config, Dockerfile, K8s manifests..."
