# ============================================================================
# GitPilot — GitHub Actions Workflow
# Triggers GitPilot agent on PR events for automated review & analysis
# ============================================================================

name: "🤖 GitPilot — AI Code Review & Security Analysis"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev, staging, main]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

concurrency:
  group: gitpilot-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

env:
  GITPILOT_VERSION: "1.0.0"

jobs:
  review:
    name: "🔍 Code Review & 🔒 Security Scan"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'gitpilot:skip')
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 📋 Fetch PR diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff 2>/dev/null || echo "No diff" > /tmp/pr.diff

      - name: 🤖 Run GitPilot AI Review
        env:
          OPENAI_API_KEY: ${{ secrets.GITPILOT_API_KEY }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          cat > /tmp/gitpilot_review.py << 'EOF'
          import os, json, requests

          api_key = os.environ.get("OPENAI_API_KEY", "")
          pr_num = os.environ.get("PR_NUM", "0")

          with open("/tmp/pr.diff", "r") as f:
              diff = f.read()

          if not diff.strip():
              diff = "No diff available"
          if len(diff) > 12000:
              diff = diff[:12000] + "\n... (truncated)"

          prompt = f"""You are GitPilot, an autonomous AI code review agent. Review PR #{pr_num}.

          Analyze the diff and provide a structured review:

          ## 1. Code Review
          - Bugs (null dereferences, off-by-one, logic errors)
          - Anti-patterns (god classes, magic numbers, deep nesting)
          - Performance issues (N+1 queries)

          ## 2. Security Analysis
          - Hardcoded secrets (API keys, passwords, tokens)
          - SQL injection, XSS, command injection
          - Unsafe imports (eval, exec, pickle, os.system)
          - Weak cryptography (MD5, SHA1 for passwords)
          - OWASP Top-10 violations

          ## 3. Risk Score
          Compute risk from 0.0 to 1.0:
          risk = 0.35 x security + 0.25 x bugs + 0.20 x complexity + 0.10 x coverage_gap + 0.10 x doc_debt

          Format response as:
          - Verdict: APPROVED, NEEDS REVIEW, or BLOCKED
          - Risk score with bar
          - Findings table: severity | file | line | description
          - Suggested fixes
          - Use emojis

          Diff:
          ```diff
          {diff}
          ```

          Respond in clean Markdown for a GitHub PR comment."""

          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json"
          }

          payload = {
              "model": "gpt-4o",
              "messages": [
                  {"role": "system", "content": "You are GitPilot, a precise AI code reviewer. Cite line numbers. Provide fixes. Critical issues get red circle emoji, minor get lightbulb emoji."},
                  {"role": "user", "content": prompt}
              ],
              "temperature": 0.1,
              "max_tokens": 4000
          }

          try:
              resp = requests.post(
                  "https://api.openai.com/v1/chat/completions",
                  headers=headers,
                  json=payload,
                  timeout=60
              )
              resp.raise_for_status()
              result = resp.json()
              review_text = result["choices"][0]["message"]["content"]
          except Exception as e:
              review_text = f"GitPilot AI review error: {str(e)}\n\nFalling back to static analysis."

          with open("/tmp/review_output.md", "w") as f:
              f.write(review_text)

          print("AI review completed")
          print(f"Review length: {len(review_text)} chars")
          EOF

          python3 /tmp/gitpilot_review.py

      - name: 💬 Post Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reviewBody = '';
            try {
              reviewBody = fs.readFileSync('/tmp/review_output.md', 'utf8');
            } catch (e) {
              reviewBody = '⚠️ GitPilot could not generate a review. Check workflow logs.';
            }
            const ts = new Date().toISOString();
            const body = `## 🤖 GitPilot Review — PR #${{ github.event.pull_request.number }}\n\n${reviewBody}\n\n---\n*GitPilot v${{ env.GITPILOT_VERSION }} • ${ts} • Powered by AI*`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
            console.log('Review comment posted');

  test-generation:
    name: "🧪 Test Generation"
    runs-on: ubuntu-latest
    needs: review
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'gitpilot:generate-tests')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: echo "Test generator would run here"

  documentation:
    name: "📝 Documentation Update"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: echo "Documentation agent would run here"

  human-override:
    name: "👤 Human Override"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/approve') ||
       startsWith(github.event.comment.body, '/reject'))
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Process Override
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: echo "Processing $COMMENT_BODY from $COMMENT_AUTHOR"

  deployment-check:
    name: "🚀 Deployment Readiness"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'gitpilot:deploy-check')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deployment advisor would run here"
