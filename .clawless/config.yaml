# ============================================================================
# GitPilot — clawless Runtime Configuration (Optional Fallback)
# Standalone deployment without gitclaw dependency
# ============================================================================

# clawless runs GitPilot as a lightweight standalone service
# Use this when gitclaw is unavailable or for local development

runtime:
  engine: clawless
  mode: standalone
  port: 8090
  host: "0.0.0.0"

# Agent configuration (same manifest)
agent:
  manifest: ../agent.yaml
  soul: ../SOUL.md
  rules: ../RULES.md

# Model — can use any OpenAI-compatible API
model:
  provider: openai-compatible
  base_url: "http://localhost:11434/v1"    # e.g., Ollama
  name: gemini-2.5-pro
  temperature: 0.1
  max_tokens: 8192
  api_key_env: GITPILOT_API_KEY

# Webhook server for GitHub events
webhook:
  enabled: true
  path: /webhook/github
  secret_env: GITHUB_WEBHOOK_SECRET
  events:
    - pull_request
    - pull_request_review
    - issue_comment

# REST API for manual triggers
api:
  enabled: true
  prefix: /api/v1
  endpoints:
    - path: /review
      method: POST
      skill: code-review
      description: "Trigger code review on a PR"
    - path: /security
      method: POST
      skill: security-analysis
      description: "Trigger security scan on a PR"
    - path: /docs
      method: POST
      skill: documentation
      description: "Trigger documentation generation"
    - path: /tests
      method: POST
      skill: test-generator
      description: "Trigger test generation"
    - path: /deploy-check
      method: POST
      skill: deployment
      description: "Trigger deployment readiness check"
    - path: /health
      method: GET
      description: "Health check endpoint"
    - path: /audit
      method: GET
      description: "Query audit log"

# Docker deployment
docker:
  image: gitpilot/agent:1.0.0
  port: 8090
  health_check:
    path: /api/v1/health
    interval: 30s
    timeout: 5s
    retries: 3
  environment:
    - GITPILOT_API_KEY
    - GITHUB_TOKEN
    - GITHUB_WEBHOOK_SECRET
  volumes:
    - ".gitpilot/audit:/app/audit"
    - ".gitpilot/cache:/app/cache"

# Skills execution
skills:
  directory: ../skills/
  parallel_execution: true
  timeout_per_skill: 120

# Tool registration
tools:
  manifest: ../tools/tools.yaml
  sandbox: true

# Logging
logging:
  level: info
  format: json
  output: stdout
